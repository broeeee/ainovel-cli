name: Sync Upstream & Release

on:
  schedule:
    # 每天 UTC 0:00 自动同步（北京时间 8:00）
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      force_sync:
        description: "强制同步所有缺失的上游 tags 并重建 Releases"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  # ---- Step 1: 检测上游新 tag 并同步代码 ----
  check-and-sync:
    runs-on: ubuntu-latest
    outputs:
      new_tags: ${{ steps.detect.outputs.new_tags }}
      has_new: ${{ steps.detect.outputs.has_new }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream and detect new tags
        id: detect
        run: |
          git remote add upstream https://github.com/voocel/ainovel-cli.git
          git fetch upstream --tags --prune

          # 确定默认分支
          DEFAULT_BRANCH=$(git remote show upstream | grep 'HEAD branch' | awk '{print $NF}' || echo "main")
          echo "default_branch=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT
          echo "Upstream default branch: $DEFAULT_BRANCH"

          # 同步 main 分支
          git checkout "$DEFAULT_BRANCH" 2>/dev/null || git checkout -b "$DEFAULT_BRANCH"
          git merge "upstream/$DEFAULT_BRANCH" --no-edit --allow-unrelated-histories || \
            git reset --hard "upstream/$DEFAULT_BRANCH"

          git push origin "$DEFAULT_BRANCH" --force-with-lease

          # 检测本地缺失的上游 tag（取最新的 5 个）
          NEW_TAGS="[]"
          FORCE="${{ inputs.force_sync }}"
          for tag in $(git tag --list 'v*' --sort=-v:refname --merged "upstream/$DEFAULT_BRANCH" | head -5); do
            if ! git rev-parse "$tag" >/dev/null 2>&1 || [ "$FORCE" = "true" ]; then
              NEW_TAGS=$(echo "$NEW_TAGS" | jq --arg t "$tag" '. + [$t]')
              # Push tag to origin
              git push origin "refs/tags/$tag" 2>/dev/null || echo "Tag $tag already pushed"
            fi
          done

          HAS_NEW=$(echo "$NEW_TAGS" | jq 'length > 0')
          echo "new_tags=$NEW_TAGS" >> $GITHUB_OUTPUT
          echo "has_new=$HAS_NEW" >> $GITHUB_OUTPUT
          echo "Detected new tags: $NEW_TAGS"

  # ---- Step 2: 为每个新 tag 运行 GoReleaser 创建 Release ----
  gorelease:
    needs: check-and-sync
    if: needs.check-and-sync.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJSON(needs.check-and-sync.outputs.new_tags) }}

    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Generate release notes
        run: |
          chmod +x .github/scripts/gen-changelog.sh
          .github/scripts/gen-changelog.sh > release-notes.md
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >-
            release --clean
            --release-notes=release-notes.md
            --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
