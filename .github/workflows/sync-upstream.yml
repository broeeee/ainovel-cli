name: Sync Upstream & Release

on:
  schedule:
    # 每天 UTC 0:00 自动同步（北京时间 8:00）
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      force_sync:
        description: "强制重建所有上游缺失的 Releases"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ============================================================
  # Job 1: 检测上游新 tag，同步分支代码，推送 tag 到 fork
  # ============================================================
  check-and-sync:
    runs-on: ubuntu-latest
    outputs:
      new_tags_json: ${{ steps.detect.outputs.new_tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream & detect new tags
        id: detect
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/voocel/ainovel-cli.git
          git fetch upstream --tags --prune

          DEFAULT_BRANCH=$(git remote show upstream | grep 'HEAD branch' | awk '{print $NF}' || echo "main")
          echo ">>> Upstream default branch: ${DEFAULT_BRANCH}"

          # 同步主分支（merge 优先，冲突时用 upstream 覆盖）
          git checkout "${DEFAULT_BRANCH}" 2>/dev/null || git checkout -b "${DEFAULT_BRANCH}"
          if ! git merge "upstream/${DEFAULT_BRANCH}" --no-edit --allow-unrelated-histories; then
            echo "Merge conflict, resetting to upstream/${DEFAULT_BRANCH}"
            git reset --hard "upstream/${DEFAULT_BRANCH}"
          fi
          git push origin "${DEFAULT_BRANCH}" --force-with-lease

          # 检测本地缺失的上游 tag（取最新 10 个）
          NEW_TAGS="[]"
          FORCE="${{ inputs.force_sync }}"

          for tag in $(git tag --list 'v*' --sort=-v:refname --merged "upstream/${DEFAULT_BRANCH}" | head -10); do
            if ! git rev-parse "${tag}" >/dev/null 2>&1 || [ "${FORCE}" = "true" ]; then
              echo "  => New tag detected: ${tag}"
              NEW_TAGS=$(echo "${NEW_TAGS}" | jq --arg t "${tag}" '. + [$t]')
              git push origin "refs/tags/${tag}"
            fi
          done

          # 使用 EOF 分隔符安全写入 JSON 到 GITHUB_OUTPUT
          echo "new_tags<<__TAGS_EOF__" >> "$GITHUB_OUTPUT"
          echo "${NEW_TAGS}" >> "$GITHUB_OUTPUT"
          echo "__TAGS_EOF__" >> "$GITHUB_OUTPUT"
          echo ">>> Total new tags: $(echo "${NEW_TAGS}" | jq 'length')"

  # ============================================================
  # Job 2: 为每个新 tag 运行 GoReleaser 发布 Release
  # ============================================================
  gorelease:
    needs: check-and-sync
    if: needs.check-and-sync.outputs.new_tags_json != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJSON(needs.check-and-sync.outputs.new_tags_json) }}
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.tag }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Generate release notes
        run: |
          chmod +x .github/scripts/gen-changelog.sh
          .github/scripts/gen-changelog.sh > release-notes.md || true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: >-
            release --clean
            --release-notes=release-notes.md
            --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
